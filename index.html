  <title>Zynex AI Privacy Policy</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: rgba(255, 255, 255, 0.9);
      --text: #142033;
      --muted: #5f6b7a;
      --line: #dbe3ee;
      --primary: #6c5ce7;
      --secondary: #00b894;
      --shadow: 0 18px 40px rgba(20, 32, 51, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(108, 92, 231, 0.14), transparent 28%),
        radial-gradient(circle at top right, rgba(0, 184, 148, 0.12), transparent 24%),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
      line-height: 1.65;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 18px 48px;
    }

    .hero {
      background: linear-gradient(135deg, rgba(108, 92, 231, 0.96), rgba(0, 184, 148, 0.92));
      color: #fff;
      border-radius: 28px;
      padding: 28px;
      box-shadow: var(--shadow);
    }

    .hero-top {
      display: flex;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(10px);
      font-size: 28px;
    }

    .hero h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.15;
    }

    .hero p {
      margin: 8px 0 0;
      color: rgba(255, 255, 255, 0.88);
      max-width: 720px;
    }

    .controls {
      margin-top: 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }

    .lang-box,
    .notice {
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 16px;
      padding: 12px 14px;
      backdrop-filter: blur(12px);
    }

    .lang-box label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
      color: rgba(255, 255, 255, 0.84);
    }

    select {
      width: 240px;
      max-width: 100%;
      border: 0;
      outline: none;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      color: var(--text);
    }

    .notice {
      color: rgba(255, 255, 255, 0.92);
      font-size: 13px;
      max-width: 420px;
    }

    .content {
      margin-top: 18px;
      background: var(--card);
      border: 1px solid rgba(219, 227, 238, 0.85);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .content-inner {
      padding: 26px;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 22px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(108, 92, 231, 0.08);
      color: var(--primary);
      font-size: 13px;
      font-weight: 700;
    }

    section {
      padding: 18px 0;
      border-top: 1px solid var(--line);
    }

    section:first-of-type {
      border-top: 0;
      padding-top: 0;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 20px;
      line-height: 1.25;
    }

    p,
    li {
      color: var(--muted);
      font-size: 15px;
    }

    ul {
      padding-inline-start: 18px;
      margin: 10px 0 0;
    }

    .footer {
      margin-top: 18px;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
    }

    .contact {
      font-weight: 700;
      color: var(--primary);
    }

    @media (max-width: 720px) {
      .hero,
      .content-inner {
        padding: 20px;
      }

      .hero h1 {
        font-size: 25px;
      }

      select {
        width: 100%;
      }
    }
  </style>
</head>

    const langOrder = ['ar', 'en', 'fr', 'es', 'de', 'tr', 'hi', 'zh', 'ja', 'ko', 'pt', 'ru', 'id'];
    const langSelect = document.getElementById('langSelect');

    langOrder.forEach((code) => {
      const option = document.createElement('option');
      option.value = code;
      option.textContent = translations[code].label;
      langSelect.appendChild(option);
    });

    function fillList(elementId, items) {
      const list = document.getElementById(elementId);
      list.innerHTML = '';
      items.forEach((item) => {
        const li = document.createElement('li');
        li.textContent = item;
        list.appendChild(li);
      });
    }

    function render(lang) {
      const t = translations[lang] || translations.en;
      document.documentElement.lang = lang;
      document.documentElement.dir = t.dir;
      document.body.style.textAlign = t.dir === 'rtl' ? 'right' : 'left';

      document.getElementById('page-title').textContent = t.title;
      document.getElementById('page-subtitle').textContent = t.subtitle;
      document.getElementById('language-label').textContent = t.dir === 'rtl' ? 'اللغة' : 'Language';
      document.getElementById('notice-text').textContent = t.notice;
      document.getElementById('meta-updated').textContent = t.updated;
      document.getElementById('meta-app').textContent = t.app;
      document.getElementById('intro-title').textContent = t.introTitle;
      document.getElementById('intro-body').textContent = t.introBody;
      document.getElementById('collect-title').textContent = t.collectTitle;
      document.getElementById('use-title').textContent = t.useTitle;
      document.getElementById('share-title').textContent = t.shareTitle;
      document.getElementById('share-body').textContent = t.shareBody;
      document.getElementById('storage-title').textContent = t.storageTitle;
      document.getElementById('storage-body').textContent = t.storageBody;
      document.getElementById('rights-title').textContent = t.rightsTitle;
      document.getElementById('rights-body').textContent = t.rightsBody;
      document.getElementById('children-title').textContent = t.childrenTitle;
      document.getElementById('children-body').textContent = t.childrenBody;
      document.getElementById('changes-title').textContent = t.changesTitle;
      document.getElementById('changes-body').textContent = t.changesBody;
      document.getElementById('contact-title').textContent = t.contactTitle;
      document.getElementById('contact-body').innerHTML = t.contactBody.replace('alibaradee.mail4@gmail.com', '<span class="contact">alibaradee.mail4@gmail.com</span>');
      document.getElementById('footer-text').textContent = t.footer;

      fillList('collect-list', t.collectList);
      fillList('use-list', t.useList);
      fillList('share-list', t.shareList);
      langSelect.value = lang;
    }

    const browserLang = (navigator.language || 'en').slice(0, 2);
    const initialLang = langOrder.includes(browserLang) ? browserLang : 'en';

    langSelect.addEventListener('change', (event) => {
      render(event.target.value);
    });

    render(initialLang);
  </script>
